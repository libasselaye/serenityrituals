<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SerenityRituals — Soins énergétiques et vibratoires</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; overflow-x: hidden; }
    body { font-family: 'DM Sans', sans-serif; background: #fff; color: #1c2340; -webkit-font-smoothing: antialiased; overflow-x: hidden; }
    ::selection { background: #1a6fba22; color: #1a6fba; }

    /* Responsive helpers */
    /* Hamburger pour <1024px (8 nav items + CTA = trop serré sous 1024) */
    @media (max-width: 1024px) {
      .desktop-nav, .desktop-cta { display: none !important; }
      .hamburger { display: flex !important; }
    }
    @media (max-width: 768px) {
      .hero-grid, .two-col-grid, .footer-grid { grid-template-columns: 1fr !important; gap: 40px !important; }
      .process-line { left: 28px !important; }
      .tusens-grid { grid-template-columns: repeat(2, 1fr) !important; gap: 32px !important; }
      .approach-grid { grid-template-columns: 1fr !important; gap: 20px !important; }
      /* Hero mobile : image fondue en arrière-plan, texte par-dessus */
      #accueil { padding-top: 120px !important; min-height: 380px !important; }
      .hero-img { width: 78% !important; right: -10px !important; object-position: center 18% !important; }
      .hero-gradient-left { background: linear-gradient(to right, rgba(250,252,255,1) 0%, rgba(250,252,255,0.97) 40%, rgba(250,252,255,0.68) 60%, rgba(250,252,255,0) 82%) !important; }
      .hero-grid { padding: 0 20px 28px !important; gap: 0 !important; overflow: hidden !important; }
      .hero-left { min-width: 0 !important; overflow: hidden !important; }
      .hero-badge { display: flex !important; max-width: 100% !important; overflow: visible !important; border-radius: 12px !important; margin-bottom: 14px !important; }
      .hero-badge span { white-space: normal !important; font-size: 0.58rem !important; line-height: 1.5 !important; }
      .hero-left h1 { font-size: 1.8rem !important; margin-bottom: 12px !important; }
      .hero-left p { font-size: 0.88rem !important; margin-bottom: 20px !important; }
      .hero-cta { flex-direction: column !important; gap: 10px !important; }
      .hero-cta a, .hero-cta button { display: block !important; width: 100% !important; box-sizing: border-box !important; text-align: center !important; padding: 12px 20px !important; }
    }
    @media (max-width: 480px) {
      .tusens-grid { grid-template-columns: repeat(2, 1fr) !important; }
    }
    @media (max-width: 540px) {
      .footer-grid { grid-template-columns: 1fr !important; }
    }

    .service-card:hover {
      transform: translateY(-6px) scale(1.01);
      box-shadow: 0 24px 64px rgba(26,63,186,0.18) !important;
    }
    .nav-link::after {
      content: '';
      position: absolute;
      bottom: -2px; left: 0; right: 0;
      height: 2px;
      background: #1a6fba;
      border-radius: 1px;
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.25s ease;
    }
    .nav-link:hover::after { transform: scaleX(1); }
    .nav-link:hover { color: #1a6fba !important; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; }
    ::-webkit-scrollbar-thumb { background: #1a6fba40; border-radius: 3px; }

    /* ── Wow effects ────────────────────────────────── */
    @keyframes float-particle {
      0%   { transform: translateY(0)    scale(1);   opacity: 0; }
      15%  {                                          opacity: 1; }
      85%  {                                          opacity: 0.55; }
      100% { transform: translateY(-72px) scale(0.6); opacity: 0; }
    }
    @keyframes pulse-ring {
      0%   { transform: translate(-50%,-50%) scale(0.7); opacity: 0.6; }
      100% { transform: translate(-50%,-50%) scale(2.8); opacity: 0; }
    }
    @keyframes btn-shine {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }
    .shimmer-btn {
      position: relative !important;
      overflow: hidden !important;
    }
    .shimmer-btn::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(105deg, transparent 40%, rgba(255,255,255,0.22) 50%, transparent 60%);
      background-size: 200% 100%;
      animation: btn-shine 3s ease-in-out infinite;
      pointer-events: none;
      border-radius: inherit;
      z-index: 1;
    }
    #cursor-glow {
      position: fixed;
      width: 500px; height: 500px;
      border-radius: 50%;
      pointer-events: none;
      z-index: 8999;
      background: radial-gradient(circle, rgba(255,184,0,0.05) 0%, rgba(0,56,199,0.03) 38%, transparent 65%);
      transform: translate(-50%,-50%);
      left: -1000px; top: -1000px;
      will-change: left, top;
    }
    @media (max-width: 768px) {
      .hero-rings    { display: none !important; }
    }

    /* ── Scroll dots indicator (Apollo-style) ── */
    .scroll-dots {
      position: fixed;
      right: 24px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 900;
      display: flex; flex-direction: column;
      gap: 18px; align-items: center;
    }
    .scroll-dots__item {
      position: relative;
      display: flex; align-items: center; justify-content: center;
      width: 20px; height: 20px;
      text-decoration: none;
    }
    .scroll-dots__label {
      position: absolute;
      right: 28px;
      top: 50%; transform: translate(0, -50%);
      white-space: nowrap;
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px; font-style: italic; color: #0038C7;
      background: #faf9f6;
      border: 1px solid rgba(232,180,58,0.55);
      border-radius: 2px;
      padding: 4px 10px;
      opacity: 0; pointer-events: none;
      transition: opacity 0.22s ease, transform 0.22s ease;
    }
    .scroll-dots__item:hover .scroll-dots__label {
      opacity: 1; transform: translate(-4px, -50%);
    }
    @media (max-width: 1024px) {
      .scroll-dots { display: none !important; }
    }

    /* ── Sub-nav Soins ── */
    .soins-subnav-link {
      position: relative;
      font-family: 'DM Sans', sans-serif; font-weight: 600;
      font-size: 0.84rem; color: #0038C7;
      text-decoration: none;
      padding: 8px 4px;
      transition: color 0.2s ease;
    }
    .soins-subnav-link::after {
      content: '';
      position: absolute;
      left: 4px; right: 4px; bottom: 2px;
      height: 1px; background: #FFB800;
      transform: scaleX(0); transform-origin: center;
      transition: transform 0.25s ease;
    }
    .soins-subnav-link:hover::after { transform: scaleX(1); }
  </style>
  <template id="__bundler_thumbnail" data-bg-color="#fafcff">
    <svg viewBox="0 0 400 260" xmlns="http://www.w3.org/2000/svg">
      <rect width="400" height="260" fill="#fafcff"/>
      <circle cx="200" cy="120" r="80" fill="#1a6fba" fill-opacity="0.07"/>
      <circle cx="200" cy="120" r="55" stroke="#1a6fba" stroke-width="1" stroke-opacity="0.2" fill="none"/>
      <circle cx="200" cy="120" r="35" stroke="#1a6fba" stroke-width="1" stroke-opacity="0.3" fill="none"/>
      <circle cx="200" cy="120" r="18" fill="#e8b43a" fill-opacity="0.25"/>
      <circle cx="200" cy="120" r="9" fill="#e8b43a" fill-opacity="0.6"/>
      <circle cx="200" cy="120" r="4" fill="#e8b43a"/>
      <line x1="200" y1="102" x2="200" y2="85" stroke="#e8b43a" stroke-width="1" stroke-opacity="0.5"/>
      <line x1="200" y1="138" x2="200" y2="155" stroke="#e8b43a" stroke-width="1" stroke-opacity="0.5"/>
      <line x1="182" y1="120" x2="165" y2="120" stroke="#e8b43a" stroke-width="1" stroke-opacity="0.5"/>
      <line x1="218" y1="120" x2="235" y2="120" stroke="#e8b43a" stroke-width="1" stroke-opacity="0.5"/>
      <text x="200" y="215" text-anchor="middle" font-family="Georgia,serif" font-size="14" fill="#1a6fba" font-style="italic">SerenityRituals</text>
    </svg>
  </template>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="tweaks-panel.jsx?v=8"></script>
  <script type="text/babel" src="sr-header.jsx?v=8"></script>
  <script type="text/babel" src="sr-sections1.jsx?v=8"></script>
  <script type="text/babel" src="sr-sections2.jsx?v=8"></script>
  <script type="text/babel" src="sr-contact.jsx?v=8"></script>

  <script type="text/babel">
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "blue": "#0038C7",
      "gold": "#FFB800",
      "roundness": 24,
      "heroStyle": "gradient"
    }/*EDITMODE-END*/;

    function App() {
      const [tv, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const colors = { blue: tv.blue, gold: tv.gold };

      return (
        <>
          <Header colors={colors}/>
          <main style={{ paddingTop: 0 }}>
            <Hero colors={colors}/>
            <TuSens colors={colors}/>
            <Problem colors={colors}/>
            <Process colors={colors}/>
            <About colors={colors}/>
            <Services colors={colors}/>
            <ProgrammeBlock colors={colors}/>
            <ForWho colors={colors}/>
            <Entreprises colors={colors}/>
            <Benefits colors={colors}/>
            <Testimonials colors={colors}/>
            <FAQ colors={colors}/>
            <Contact colors={colors}/>
          </main>
          <Footer colors={colors}/>
          <ScrollDots/>
          <TweaksPanel>
            <TweakSection label="Couleurs">
              <TweakColor id="blue" label="Bleu Santorin"/>
              <TweakColor id="gold" label="Jaune soleil"/>
            </TweakSection>
            <TweakSection label="Design">
              <TweakSlider id="roundness" label="Arrondis des cartes" min={8} max={36} step={2}/>
            </TweakSection>
          </TweaksPanel>
        </>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App/>);
  </script>
  <script>
    (function() {
      var el = document.createElement('div');
      el.id = 'cursor-glow';
      document.body.appendChild(el);
      document.addEventListener('mousemove', function(e) {
        el.style.left = e.clientX + 'px';
        el.style.top  = e.clientY + 'px';
      }, { passive: true });
    })();
  </script>
</body>
</html>
